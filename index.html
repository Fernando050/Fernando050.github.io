<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat App</title>

<link rel="stylesheet" href="style.css">
<script type="module" src="app.js"></script>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="center">
  <div class="card">
    <h2>Login 🔐</h2>

    <input id="loginId" placeholder="ID">
    <input id="loginPass" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p onclick="showRegister()" class="link">Create account</p>
  </div>
</div>

<!-- REGISTER -->
<div id="registerBox" class="center hidden">
  <div class="card">
    <h2>Create Account 🆕</h2>

    <input id="regId" placeholder="Choose ID">
    <input id="regPass" type="password" placeholder="Password">

    <button onclick="register()">Create account</button>

    <p onclick="showLogin()" class="link">Back to login</p>
  </div>
</div>

<!-- CHAT -->
<div id="chatBox" class="hidden">

  <div class="header">
    <h3>Chat 💬</h3>
    <button onclick="logout()">X</button>
  </div>

  <div class="connectBox">
    <input id="targetUser" placeholder="Enter user ID">
    <button onclick="startChat()">Start</button>
  </div>

  <div id="messages"></div>

  <div class="inputBox">
    <input id="msgInput" placeholder="Ekri mesaj...">
    <button onclick="sendMessage()">➤</button>
  </div>

</div>

</body>
</html>
