<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Pour toi ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>💖 Salut Edelène</h1>
    
    <p class="message">
        Depi premye fwa mwen wè w, gen yon bagay espesyal mwen santi...
        Ou fè kè m bat pi vit 💓
    </p>

    <p class="message">
        Mwen pa pafè, men mwen sensè...
        E mwen ta renmen konnen si ou ta bay mwen yon chans 😊
    </p>

    <h2>Eske ou vle eseye avè m? ❤️</h2>

    <div class="buttons">
        <button onclick="yes()">Wi 😍</button>
        <button onclick="no()">Non 😢</button>
    </div>

    <p id="response"></p>

    <!-- Bouton WhatsApp -->
    <a id="whatsappBtn" target="_blank">
        <button class="whatsapp">💬 Pale avè m sou WhatsApp</button>
    </a>

</div>

<script src="script.js"></script>

</body>
</html>
